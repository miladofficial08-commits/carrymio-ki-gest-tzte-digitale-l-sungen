[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/call"
  to = "/.netlify/functions/call"
  status = 200
  force = true

[[redirects]]
  from = "/api/demo-booking"
  to = "/.netlify/functions/demo-booking"
  status = 200
  force = true

[[redirects]]
  from = "/api/debug/calls"
  to = "/.netlify/functions/debug-calls"
  status = 200
  force = true

[[redirects]]
  from = "/api/analytics"
  to = "/.netlify/functions/analytics"
  status = 200
  force = true

[[redirects]]
  from = "/api/call/*/end"
  to = "/.netlify/functions/call"
  status = 200
  force = true

[[redirects]]
  from = "/tawano"
  to = "/"
  status = 301

[[redirects]]
  from = "/handwerker"
  to = "/handwerker.html"
  status = 200

[[redirects]]
  from = "/krankenbefoerderung"
  to = "/krankenbefoerderung.html"
  status = 200

[[redirects]]
  from = "/beautyworlds-dashboard"
  to = "/beautyworlds-dashboard.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://sc.lfeeder.com https://*.lfeeder.com https://*.leadfeeder.com https://*.lf-discover.com https://*.dealfront.com https://app.cal.com https://cal.com; script-src-elem 'self' 'unsafe-inline' https://sc.lfeeder.com https://*.lfeeder.com https://*.leadfeeder.com https://*.lf-discover.com https://*.dealfront.com https://app.cal.com https://cal.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: https://*.lfeeder.com https://*.leadfeeder.com https://*.lf-discover.com https://*.dealfront.com https://app.cal.com https://cal.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.openai.com https://sc.lfeeder.com https://*.lfeeder.com https://*.leadfeeder.com https://*.lf-discover.com https://*.dealfront.com https://app.cal.com https://cal.com; frame-src 'self' https://app.cal.com https://cal.com; child-src 'self' https://app.cal.com https://cal.com; media-src 'self' data: blob:; manifest-src 'self'"
