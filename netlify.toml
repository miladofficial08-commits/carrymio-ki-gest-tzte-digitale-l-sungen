# Netlify Build Configuration
[build]
command = "npm run build"
publish = "dist"
functions = "netlify/functions"

# Static File Rules - MUST BE FIRST!
[[redirects]]
from = "/robots.txt"
to = "/robots.txt"
status = 200
force = false

[[redirects]]
from = "/sitemap.xml"
to = "/sitemap.xml"
status = 200
force = false

[[redirects]]
from = "/manifest.json"
to = "/manifest.json"
status = 200
force = false

# SPA Fallback - MUST BE LAST
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Cache Rules für Assets
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
for = "/*.js"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.css"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.json"
[headers.values]
Cache-Control = "public, max-age=3600"

# Security Headers
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "SAMEORIGIN"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "geolocation=(), microphone=(), camera=()"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.openai.com https://api.emailjs.com; frame-src 'self'; child-src 'self'; media-src 'self' data: blob:; manifest-src 'self'"

# Static Redirects
[[redirects]]
from = "/sitemap.xml"
to = "/sitemap.xml"
status = 200

[[redirects]]
from = "/robots.txt"
to = "/robots.txt"
status = 200

[[redirects]]
from = "/manifest.json"
to = "/manifest.json"
status = 200

# Legal pages — serve the SPA so React Router handles them
[[redirects]]
from = "/impressum"
to = "/index.html"
status = 200

[[redirects]]
from = "/datenschutz"
to = "/index.html"
status = 200

[[redirects]]
from = "/agb"
to = "/index.html"
status = 200
